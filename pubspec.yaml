name: pickc_customer_app
description: "Pick-C Customer App — truck booking logistics platform."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.3

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^13.2.0

  # HTTP client
  dio: ^5.4.3+1

  # Connectivity
  connectivity_plus: ^6.0.3

  # Local storage
  shared_preferences: ^2.2.3
  flutter_secure_storage: ^9.2.2

  # Immutable models
  freezed_annotation: ^2.4.1
  json_annotation: ^4.9.0

  # Maps & location
  google_maps_flutter: ^2.6.1
  geolocator: ^11.0.0
  flutter_polyline_points: ^2.0.1
  geocoding: ^3.0.0

  # Real-time
  web_socket_channel: ^3.0.3
  signalr_netcore: ^1.3.8

  # Notifications (no Firebase)
  flutter_local_notifications: ^17.2.2

  # Payment gateways
  razorpay_flutter: ^1.3.7
  webview_flutter: ^4.8.0

  # RSA encryption
  pointycastle: ^3.9.1

  # UI helpers
  flutter_rating_bar: ^4.0.1
  cached_network_image: ^3.3.1
  photo_view: ^0.14.0

  # Functional programming
  dartz: ^0.10.1

  # Utilities
  intl: ^0.19.0
  url_launcher: ^6.3.0
  device_info_plus: ^10.1.2
  permission_handler: ^11.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  build_runner: ^2.4.11
  riverpod_generator: ^2.4.3
  freezed: ^2.5.2
  json_serializable: ^6.8.0
  flutter_lints: ^6.0.0
  mocktail: ^1.0.4
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/images/pick_c_100x100.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/trucks/

  # fonts:
  #   - family: Schyler
  #     fonts:
  #       - asset: fonts/Schyler-Regular.ttf
